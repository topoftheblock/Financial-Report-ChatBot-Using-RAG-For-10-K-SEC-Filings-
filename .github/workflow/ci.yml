name: CI Pipeline

# Trigger the workflow on pushes and pull requests to the main branch
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Check out the repository code
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Set up Python 3.10 (Matching your project requirements)
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: 'pip' # Caches downloaded packages to make future runs much faster

    # 3. Install your project dependencies + developer tools
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Install the main app dependencies
        pip install -r requirements.txt
        # Install testing and linting tools (pytest for tests, ruff for fast linting)
        pip install pytest ruff

    # 4. Enforce code quality and formatting
    - name: Lint with Ruff
      run: |
        # Check for syntax errors or undefined names
        ruff check .
        # Check if the code is formatted correctly (optional, you can remove --check to just let it pass)
        ruff format --check .

    # 5. Run the test suite
    - name: Run unit tests with Pytest
      env:
        # Provide a dummy API key so tests don't crash on import if they look for the env variable
        OPENAI_API_KEY: "sk-dummy-key-for-testing-do-not-use"
      run: |
        # PYTHONPATH=. ensures Python finds your 'src' and 'app' modules correctly
        PYTHONPATH=. pytest src/tests/